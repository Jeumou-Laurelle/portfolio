<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ profile.name }} | {{ profile.title }}</title>
    <meta name="description" content="{{ profile.bio }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header id="navbar">
        <nav class="container">
            <div class="logo">{{ profile.name.split(' ')[0] }} <span>{{ profile.name.split(' ')[1] }}.</span></div>
            <ul class="nav-links">
                <li><a href="#hero">Accueil</a></li>
                <li><a href="#about">À propos</a></li>
                <li><a href="#experience">Parcours</a></li>
                <li><a href="#projects">Projets</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="nav-cta">
                <a href="#contact" class="btn btn-primary">Recrutez-moi</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">{{ profile.name.split(' ')[0] }} <span>{{ profile.name.split(' ')[1] }}.</span></div>
                <div class="social-links">
                    <a href="{{ profile.socials.github }}" target="_blank"><i class="fab fa-github"></i></a>
                    <a href="{{ profile.socials.linkedin }}" target="_blank"><i class="fab fa-linkedin"></i></a>
                    <a href="{{ profile.socials.twitter }}" target="_blank"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
            <div class="footer-bottom reveal">
                <p>&copy; 2026 {{ profile.name }}. Tous droits réservés.</p>
            </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
